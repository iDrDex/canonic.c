name: gates
on: [push, pull_request]

jobs:
  sov:
    name: "the sov is sufficient — regrow + full gates from 8 KB"
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: ./regrow.sh --into grown
      - run: cp canonic.sov grown/ && cd grown && make gate
